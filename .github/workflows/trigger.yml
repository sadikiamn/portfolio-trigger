name: Trigger Portfolio Report

on:
  schedule:
    # 15:05 UTC = 16:05 Maroc (UTC+1) — Lun-Ven
    - cron: '5 15 * * 1-5'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger portfolio-casablanca
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.PORTFOLIO_TOKEN }}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/vnd.github.v3+json" \
            -d '{"ref": "main"}' \
            https://api.github.com/repos/sadikiamn/portfolio-casablanca/actions/workflows/daily.yml/dispatches
          echo "Triggered at $(date -u)"
